name: "AWS Data Pipeline Demo - 9 Screenshot Capture"
description: "Captures 9 strategic screenshots of AWS data pipeline automation demo main sections"
version: "1.0.0"

config:
  headless: true
  timeout: 30000
  viewport:
    width: 1280
    height: 720

steps:
  # Screenshot 1: Homepage Hero Section
  - type: navigate
    description: "Navigate to AWS Pipeline Demo homepage"
    url: "file:///Users/Mike/Desktop/programming/2_proposals/upwork/021930023336535235424/index.html"
    waitUntil: "networkidle2"
  - type: wait
    description: "Wait for page to fully load"
    value: 3000
  - type: screenshot
    description: "Homepage hero and value proposition"
    screenshot:
      fullPage: true

  # Screenshot 2: Homepage Problem Section
  - type: evaluate
    description: "Scroll to problem section"
    script: "document.querySelector('.problem-section').scrollIntoView({behavior: 'smooth', block: 'start'})"
  - type: wait
    description: "Wait for scroll to complete"
    value: 2000
  - type: screenshot
    description: "Problem identification section"
    screenshot:
      fullPage: true

  # Screenshot 3: Homepage Solution Section
  - type: evaluate
    description: "Scroll to solution section"
    script: "document.querySelector('.solution-section').scrollIntoView({behavior: 'smooth', block: 'start'})"
  - type: wait
    description: "Wait for scroll to complete"
    value: 2000
  - type: screenshot
    description: "AWS solution workflow"
    screenshot:
      fullPage: true

  # Screenshot 4: Pipeline Dashboard Main View
  - type: click
    description: "Navigate to Pipeline Dashboard"
    selector: "a[href='pipeline-dashboard.html']"
  - type: wait
    description: "Wait for dashboard to load"
    value: 3000
  - type: waitForSelector
    description: "Wait for dashboard container"
    selector: ".dashboard-container"
  - type: screenshot
    description: "Pipeline dashboard overview"
    screenshot:
      fullPage: true

  # Screenshot 5: Dashboard Pipeline Flow Visualization
  - type: evaluate
    description: "Scroll to pipeline flow section"
    script: "document.querySelector('.pipeline-flow-card').scrollIntoView({behavior: 'smooth', block: 'center'})"
  - type: wait
    description: "Wait for scroll and animations"
    value: 2000
  - type: screenshot
    description: "Pipeline flow visualization"
    screenshot:
      fullPage: true

  # Screenshot 6: Data Transformation Page
  - type: click
    description: "Navigate to Data Transformation"
    selector: "a[href='data-transformation.html']"
  - type: wait
    description: "Wait for transformation page to load"
    value: 3000
  - type: waitForSelector
    description: "Wait for transformation container"
    selector: ".transformation-container"
  - type: screenshot
    description: "AWS Glue job configuration"
    screenshot:
      fullPage: true

  # Screenshot 7: Transformation Script View
  - type: click
    description: "Switch to script tab"
    selector: ".tab:nth-child(2)"
  - type: wait
    description: "Wait for script tab to load"
    value: 2000
  - type: waitForSelector
    description: "Wait for code editor"
    selector: ".code-editor"
  - type: screenshot
    description: "Glue transformation script"
    screenshot:
      fullPage: true

  # Screenshot 8: Automated Reporting Page
  - type: click
    description: "Navigate to Reporting"
    selector: "a[href='reporting.html']"
  - type: wait
    description: "Wait for reporting page to load"
    value: 3000
  - type: waitForSelector
    description: "Wait for reporting container"
    selector: ".reporting-container"
  - type: screenshot
    description: "Automated reporting interface"
    screenshot:
      fullPage: true

  # Screenshot 9: Report Preview Section
  - type: evaluate
    description: "Scroll to report preview"
    script: "document.querySelector('.report-preview').scrollIntoView({behavior: 'smooth', block: 'center'})"
  - type: wait
    description: "Wait for scroll to complete"
    value: 2000
  - type: screenshot
    description: "Report preview with charts and data"
    screenshot:
      fullPage: true