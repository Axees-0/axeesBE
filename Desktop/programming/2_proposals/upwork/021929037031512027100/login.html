<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 企業資源規劃系統</title>
    <style>
        :root {
            /* Primary Colors */
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-light: #dbeafe;
            
            /* Secondary Colors */
            --secondary-color: #64748b;
            --secondary-light: #f1f5f9;
            
            /* Status Colors */
            --success-color: #059669;
            --warning-color: #d97706;
            --danger-color: #dc2626;
            --info-color: #0891b2;
            
            /* Neutral Colors */
            --background-color: #f8fafc;
            --surface-color: #ffffff;
            --border-color: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            
            /* Shadows */
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            
            /* Typography */
            --font-family: 'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', 'Source Han Sans TC', system-ui, -apple-system, sans-serif;
            --font-xs: 0.75rem;
            --font-sm: 0.875rem;
            --font-base: 1rem;
            --font-lg: 1.125rem;
            --font-xl: 1.25rem;
            --font-2xl: 1.5rem;
            --font-3xl: 1.875rem;
            --font-4xl: 2.25rem;
            --font-normal: 400;
            --font-medium: 500;
            --font-semibold: 600;
            --font-bold: 700;
            
            /* Spacing */
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;
            --space-12: 3rem;
            --space-16: 4rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
        }

        .login-container {
            background-color: var(--surface-color);
            border-radius: 1rem;
            box-shadow: var(--shadow-lg);
            padding: var(--space-12);
            width: 100%;
            max-width: 420px;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--info-color));
        }

        .logo-section {
            text-align: center;
            margin-bottom: var(--space-8);
        }

        .logo {
            width: 64px;
            height: 64px;
            background: var(--primary-color);
            border-radius: 1rem;
            margin: 0 auto var(--space-4);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
        }

        .logo svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        .system-title {
            font-size: var(--font-2xl);
            font-weight: var(--font-bold);
            color: var(--text-primary);
            margin-bottom: var(--space-2);
        }

        .system-subtitle {
            font-size: var(--font-sm);
            color: var(--text-secondary);
            font-weight: var(--font-medium);
        }

        .form-group {
            margin-bottom: var(--space-5);
        }

        .form-label {
            display: block;
            font-size: var(--font-sm);
            font-weight: var(--font-medium);
            color: var(--text-primary);
            margin-bottom: var(--space-2);
        }

        .form-input {
            width: 100%;
            padding: var(--space-4);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            font-size: var(--font-base);
            font-family: var(--font-family);
            transition: all 0.2s ease;
            background-color: var(--surface-color);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            padding: var(--space-4) var(--space-6);
            border: none;
            border-radius: 0.5rem;
            font-weight: var(--font-medium);
            font-size: var(--font-base);
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-bottom: var(--space-4);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: var(--font-sm);
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary-color);
        }

        .forgot-password {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: var(--font-medium);
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
            position: relative;
        }

        .loading::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            margin: -10px 0 0 -10px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: var(--space-3);
            border-radius: 0.375rem;
            margin-bottom: var(--space-4);
            border: 1px solid;
            font-size: var(--font-sm);
        }

        .alert-error {
            background-color: #fef2f2;
            border-color: #ef4444;
            color: #dc2626;
        }

        .alert-success {
            background-color: #f0fdf4;
            border-color: #22c55e;
            color: #15803d;
        }

        .language-selector {
            position: absolute;
            top: var(--space-4);
            right: var(--space-4);
            font-size: var(--font-sm);
        }

        .language-selector select {
            border: 1px solid var(--border-color);
            border-radius: 0.25rem;
            padding: var(--space-2);
            background-color: var(--surface-color);
            font-family: var(--font-family);
        }

        .demo-info {
            background-color: var(--primary-light);
            border: 1px solid var(--primary-color);
            border-radius: 0.5rem;
            padding: var(--space-4);
            margin-bottom: var(--space-6);
            text-align: center;
        }

        .demo-info h4 {
            color: var(--primary-color);
            font-size: var(--font-sm);
            font-weight: var(--font-semibold);
            margin-bottom: var(--space-2);
        }

        .demo-credentials {
            font-size: var(--font-xs);
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .demo-credentials code {
            background-color: var(--surface-color);
            padding: 2px 4px;
            border-radius: 3px;
            font-family: monospace;
            color: var(--primary-color);
            font-weight: var(--font-medium);
        }
    </style>
</head>
<body>
    <div class="language-selector">
        <select id="languageSelect" onchange="changeLanguage()">
            <option value="zh-TW">繁體中文</option>
            <option value="zh-CN">简体中文</option>
            <option value="en">English</option>
        </select>
    </div>

    <div class="login-container">
        <div class="logo-section">
            <div class="logo">
                <svg viewBox="0 0 24 24">
                    <path d="M3 3h18v4H3V3zm0 6h18v4H3V9zm0 6h18v4H3v-4z"/>
                </svg>
            </div>
            <h1 class="system-title">企業資源規劃系統</h1>
            <p class="system-subtitle">Enterprise Resource Planning System</p>
        </div>

        <div class="demo-info">
            <h4>🎯 演示系統登入</h4>
            <div class="demo-credentials">
                帳號: <code>admin</code> | 密碼: <code>123456</code><br>
                <small>此為功能展示版本，支援 Big5 編碼與繁體中文</small>
            </div>
        </div>

        <div id="alertContainer"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label" for="username">使用者帳號</label>
                <input type="text" id="username" class="form-input" placeholder="請輸入使用者帳號" value="admin" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">密碼</label>
                <input type="password" id="password" class="form-input" placeholder="請輸入密碼" value="123456" required>
            </div>

            <div class="login-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <span>記住我</span>
                </label>
                <a href="#" class="forgot-password" onclick="showForgotPassword()">忘記密碼？</a>
            </div>

            <button type="submit" class="btn-primary" id="loginBtn">
                登入系統
            </button>
        </form>

        <div style="text-align: center; margin-top: var(--space-8); padding-top: var(--space-4); border-top: 1px solid var(--border-color);">
            <p style="font-size: var(--font-xs); color: var(--text-muted);">
                &copy; 2024 企業資源規劃系統. 版權所有<br>
                <small>支援 Windows 10/11 | MsSQL + MySQL | Big5 編碼</small>
            </p>
        </div>
    </div>

    <script>
        function showAlert(message, type = 'error') {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alertDiv);
            
            if (type === 'success') {
                setTimeout(() => {
                    alertDiv.remove();
                }, 3000);
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            // Add loading state
            loginBtn.classList.add('loading');
            loginBtn.textContent = '登入中...';
            loginBtn.disabled = true;
            
            // Simulate authentication delay
            setTimeout(() => {
                if (username === 'admin' && password === '123456') {
                    showAlert('登入成功！正在載入系統...', 'success');
                    
                    // Store login state
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('currentUser', JSON.stringify({
                        username: username,
                        displayName: '系統管理員',
                        role: 'admin',
                        loginTime: new Date().toISOString()
                    }));
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showAlert('帳號或密碼錯誤，請重新輸入');
                    loginBtn.classList.remove('loading');
                    loginBtn.textContent = '登入系統';
                    loginBtn.disabled = false;
                }
            }, 1500);
        }

        function showForgotPassword() {
            showAlert('請聯繫系統管理員重設密碼\n電話: +886-2-1234-5678\nEmail: admin@company.com.tw', 'info');
        }

        function changeLanguage() {
            const language = document.getElementById('languageSelect').value;
            showAlert('語言切換功能將在完整版本中提供', 'info');
        }

        // Check if already logged in
        window.addEventListener('load', function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (isLoggedIn === 'true') {
                showAlert('您已經登入系統', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }
        });

        // Demo auto-fill animation
        setTimeout(() => {
            const demoInfo = document.querySelector('.demo-info');
            demoInfo.style.animation = 'pulse 2s infinite';
        }, 1000);

        // Add pulse animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes pulse {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.8; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
