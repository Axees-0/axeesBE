name: "MusicAI Platform - 9 Screenshot Portfolio Capture"
description: "Captures 9 strategic screenshots of AI-powered music booking platform demo"
version: "1.0.0"

config:
  headless: true
  timeout: 30000
  viewport:
    width: 1280
    height: 720

steps:
  # Screenshot 1: Homepage - Landing and overview
  - type: navigate
    description: "Navigate to homepage"
    url: "file:///Users/Mike/Desktop/programming/2_proposals/upwork/021929721942233831631/index.html"
    waitUntil: "networkidle2"
  - type: wait
    description: "Wait for page to fully load"
    value: 3000
  - type: screenshot
    description: "Homepage - AI Music Platform Landing"
    screenshot:
      fullPage: true

  # Screenshot 2: Homepage features section
  - type: evaluate
    description: "Scroll to features section"
    script: "document.querySelector('.section').scrollIntoView({ behavior: 'smooth' })"
  - type: wait
    description: "Wait for scroll animation"
    value: 2000
  - type: screenshot
    description: "Homepage - Core Features Section"
    screenshot:
      fullPage: true

  # Screenshot 3: Homepage stats and performance metrics
